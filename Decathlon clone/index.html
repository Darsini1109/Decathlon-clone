<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decathlon Clone</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top-nav">
    <div class="logo">🏋️‍♂️ Decathlon</div>
    <input type="text" placeholder="Search For 60+ Sports and 6000+ Products" class="search" />
    <div class="location">📍 560002 <span class="change">CHANGE</span></div>
    <div class="nav-icons">
      <span>👤 Sign In</span>
      <span>🏬 My Store</span>
      <span>📞 Support</span>
      <span>❤️ Wishlist</span>
      <span>🛒 Cart</span>
    </div>
  </header>

  <div class="sale-timer">
    End of Summer Sale Starts In <span id="timer">--:--:--</span>
  </div>

  <section class="banner">
    <img src="/images/offer.avif" alt="Decathlon Banner">
  </section>

  <section class="categories">
    <div class="category">
      <img src="images/category1.avif" alt="Men" />
      <p>Men</p>
    </div>
    <div class="category">
      <img src="images/category2.avif" alt="Women" />
      <p>Women</p>
    </div>
    <div class="category">
      <img src="images/category3.avif" alt="Kids" />
      <p>Kids</p>
    </div>
    <div class="category">
      <img src="images/category4.webp" alt="Shoes" />
      <p>Shoes</p>
    </div>
    <div class="category">
      <img src="images/category4.avif" alt="Equipments" />
      <p>Equipments &<br>Cycles</p>
    </div>
    <div class="category">
      <img src="images/category6.webp" alt="Bags" />
      <p>Bags &<br>Backpacks</p>
    </div>
    <div class="category">
      <img src="images/category7.avif" alt="Accessories" />
      <p>Sports<br>Accessories</p>
    </div>
    <div class="category">
      <img src="images/category8.avif" alt="Sale" />
      <p>Sale</p>
    </div>
  </section>

  <!-- Slideshow -->
  <div class="slideshow-container">
    <div class="slide fade">
      <img src="/images/category9.avif" alt="Slide 1">
    </div>
    <div class="slide fade">
      <img src="/images/category10.avif" alt="Slide 2">
    </div>
    <div class="slide fade">
      <img src="/images/category9.avif" alt="Slide 3">
    </div>
    <div class="slide fade">
      <img src="/images/category12.avif" alt="Slide 4">
    </div>
    <div class="slide fade">
      <img src="/images/category13.avif" alt="Slide 5">
    </div>
    <div class="slide fade">
      <img src="/images/category14.avif" alt="Slide 6">
    </div>

    <!-- Navigation arrows -->
    <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
    <a class="next" onclick="plusSlides(1)">&#10095;</a>
  </div>




  

  <!-- Include JS at the end -->
  <script src="script.js"></script>
</body>
</html>
